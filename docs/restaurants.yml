  - name: Restaurant Milo (Hotel Seven)
    zone: zentrum
    url_menu: https://www.hotel-seven.at/speisekarte-mittagsmenues/
    source: website
    crawl:
      kind: html
      url: https://www.hotel-seven.at/speisekarte-mittagsmenues/
      parser: hotel_seven_milo

  - name: Chickis Villach
    zone: zentrum
    url_menu: https://www.chickis.at/chickis-mittagsmenue-schnell-gut-guenstig/
