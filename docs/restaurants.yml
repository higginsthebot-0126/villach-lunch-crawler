# Villach Lunch Crawler — restaurant directory
# Conventions:
# - zone: zentrum | zentrum-gare | atrio
# - url_menu: official menu channel (restaurant website, PDF, or official ordering/menu page)
# - source: website | pdf | order | chain
# - crawl: optional; only add when we have a stable source + parser

